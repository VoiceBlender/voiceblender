        action: send
        channel:
            $ref: '#/channels/vsi'
        summary: Voicemail beep tone detected after machine classification
        messages:
            - $ref: '#/channels/vsi/messages/amd.beep'
    send_connected:
        action: send
        channel:
            $ref: '#/channels/vsi'
        summary: First frame the server sends after the WebSocket upgrade completes. Carries no data.
        messages:
            - $ref: '#/channels/vsi/messages/connected'
    send_ping:
        action: send
        channel:
            $ref: '#/channels/vsi'
        summary: Periodic application-level keepalive (every ~30 s). Clients may reply with `pong` or ignore.
        messages:
            - $ref: '#/channels/vsi/messages/ping'
    receive_pong:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Optional client keepalive reply to a `ping`. Currently a no-op on the server side.
        messages:
            - $ref: '#/channels/vsi/messages/pong'
    receive_stop:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Client-initiated graceful close. The server stops the recv loop and closes the connection.
        messages:
            - $ref: '#/channels/vsi/messages/stop'
    send_events_dropped:
        action: send
        channel:
            $ref: '#/channels/vsi'
        summary: Sent when the per-connection event buffer overflowed. The accompanying `count` indicates how many events were dropped since the last notification. Clients should resync via REST after seeing this.
        messages:
            - $ref: '#/channels/vsi/messages/events_dropped'
    send_error:
        action: send
        channel:
            $ref: '#/channels/vsi'
        summary: Generic error frame for invalid JSON, unknown command types, or command handler failures. Echoes `request_id` when the offending message had one. `data` carries `{code, message}`.
        messages:
            - $ref: '#/channels/vsi/messages/error'
