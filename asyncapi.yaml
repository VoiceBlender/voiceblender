        frame_connected:
            name: frame_connected
            title: First frame the server sends after the WebSocket upgrade completes. Carries no data.
            payload:
                type: object
                properties:
                    type:
                        const: connected
                required:
                    - type
        frame_ping:
            name: frame_ping
            title: Periodic application-level keepalive (every ~30 s). Clients may reply with `pong` or ignore.
            payload:
                type: object
                properties:
                    type:
                        const: ping
                required:
                    - type
        frame_pong:
            name: frame_pong
            title: Optional client keepalive reply to a `ping`. Currently a no-op on the server side.
            payload:
                type: object
                properties:
                    type:
                        const: pong
                required:
                    - type
        frame_stop:
            name: frame_stop
            title: Client-initiated graceful close. The server stops the recv loop and closes the connection.
            payload:
                type: object
                properties:
                    type:
                        const: stop
                required:
                    - type
        frame_events_dropped:
            name: frame_events_dropped
            title: Sent when the per-connection event buffer overflowed. The accompanying `count` indicates how many events were dropped since the last notification. Clients should resync via REST after seeing this.
            payload:
                type: object
                properties:
                    type:
                        const: events_dropped
                    count:
                        type: integer
                        description: Number of events dropped since the last notification.
                required:
                    - type
                    - count
        frame_error:
            name: frame_error
            title: Generic error frame for invalid JSON, unknown command types, or command handler failures. Echoes `request_id` when the offending message had one. `data` carries `{code, message}`.
            payload:
                type: object
                properties:
                    type:
                        const: error
                    request_id:
                        type: string
                    data:
                        type: object
                        properties:
                            code:
                                type: integer
                            message:
                                type: string
                        required:
                            - code
                            - message
                required:
                    - type
                    - data
    schemas:
        AddLegToRoomResult:
            type: object
            properties:
                status:
                    type: string
                room_id:
                    type: string
                leg_id:
                    type: string
            required:
                - status
                - room_id
                - leg_id
        ICECandidateInit:
            type: object
            properties:
                candidate:
                    type: string
                sdpMid:
                    type: string
                sdpMLineIndex:
                    type: integer
                usernameFragment:
                    type: string
            required:
                - candidate
                - sdpMid
                - sdpMLineIndex
                - usernameFragment
        WebRTCCandidatesResult:
            type: object
            properties:
                candidates:
                    type: array
                    items:
                        $ref: '#/components/schemas/ICECandidateInit'
                done:
                    type: boolean
            required:
                - candidates
                - done
        WebRTCOfferRequest:
            type: object
            properties:
                sdp:
                    type: string
            required:
                - sdp
        WebRTCOfferResult:
            type: object
            properties:
                leg_id:
                    type: string
                sdp:
                    type: string
            required:
                - leg_id
                - sdp
        addLegPayload:
            type: object
            properties:
                room_id:
                    type: string
                leg_id:
                    type: string
                mute:
                    type: boolean
                deaf:
                    type: boolean
                accept_dtmf:
                    type: boolean
            required:
                - room_id
                - leg_id
        dtmfPayload:
            type: object
            properties:
                id:
                    type: string
                digits:
                    type: string
            required:
                - id
                - digits
        idPayload:
            type: object
            properties:
                id:
                    type: string
            required:
                - id
        roomLegPayload:
            type: object
            properties:
                room_id:
                    type: string
                leg_id:
                    type: string
            required:
                - room_id
                - leg_id
        rttPayload:
            type: object
            properties:
                id:
                    type: string
                text:
                    type: string
            required:
                - id
                - text
        vsiAnswerLegPayload:
            type: object
            properties:
                id:
                    type: string
                speech_detection:
                    type: boolean
                codec:
                    type: string
            required:
                - id
        vsiDeleteLegPayload:
            type: object
            properties:
                id:
                    type: string
                reason:
                    type: string
            required:
                - id
        vsiStatusResponse:
            type: object
            properties:
                status:
                    type: string
            required:
                - status
        vsiWebRTCAddCandidatePayload:
            type: object
            properties:
                id:
                    type: string
                candidate:
                    $ref: '#/components/schemas/ICECandidateInit'
            required:
                - id
                - candidate
